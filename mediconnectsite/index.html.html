<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediConnect</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #007BFF;
      color: #ffffff;
      text-align: center;
    }

    h1 {
      margin-top: 30px;
      font-size: 36px;
    }

    p.tagline {
      font-size: 18px;
      margin-bottom: 20px;
      color: #e0e0e0;
    }

    #buttonBar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
      margin-bottom: 30px;
    }

    .white-btn {
      background-color: #ffffff;
      color: #003366;
      border: none;
      border-radius: 12px;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      transition: background-color 0.3s ease;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .white-btn:hover {
      background-color: #e6f0ff;
    }

    .form-container {
      background-color: #3399FF;
      padding: 30px;
      border-radius: 16px;
      max-width: 400px;
      margin: 0 auto 40px auto;
      display: none;
      text-align: left;
    }

    .form-container h2 {
      color: #ffffff;
      margin-bottom: 20px;
    }

    .form-container input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
    }

    .form-container button {
      background-color: #003366;
      color: #ffffff;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }

    .form-container .cancel-btn {
      background-color: #cccccc;
      color: #333333;
      float: right;
    }
  </style>
</head>
<body>

  <h1>MediConnect</h1>
  <p class="tagline">Secure access in moments that matter</p>

  <div id="buttonBar">
    <button class="white-btn" data-target="emt">🚑 EMT Access</button>
    <button class="white-btn" data-target="login">👤 Patient Login</button>
    <button class="white-btn" data-target="hospital">🏥 Hospital Login</button>
    <button class="white-btn" disabled>🌀 Fingerprint (Coming soon!)</button>
    <button class="white-btn" data-target="signup">📝 Patient Signup</button>
  </div>

  <div id="login" class="form-container">
    <h2>Patient Login</h2>
    <input type="text" id="loginUser" placeholder="Username">
    <input type="password" id="loginPass" placeholder="Password">
    <button onclick="submitLogin()">Login</button>
    <button class="cancel-btn" onclick="hideForms()">Cancel</button>
  </div>

  <div id="signup" class="form-container">
    <h2>Patient Signup</h2>
    <input type="text" id="signupName" placeholder="Name">
    <input type="number" id="signupAge" placeholder="Age">
    <input type="text" id="signupGender" placeholder="Gender">
    <input type="email" id="signupEmail" placeholder="Email">
    <input type="text" id="signupLicense" placeholder="License #">
    <input type="password" id="signupPass" placeholder="Password">
    <button onclick="submitSignup()">Submit</button>
    <button class="cancel-btn" onclick="hideForms()">Cancel</button>
  </div>

  <div id="hospital" class="form-container">
    <h2>Hospital Login</h2>
    <input type="text" id="hospitalID" placeholder="Staff ID">
    <input type="password" id="hospitalPass" placeholder="Password">
    <button onclick="submitHospital()">Login</button>
    <button class="cancel-btn" onclick="hideForms()">Cancel</button>
  </div>

  <div id="emt" class="form-container">
    <h2>EMT Access</h2>
    <input type="text" id="emtCode" placeholder="EMT Code">
    <button onclick="submitEMT()">Submit</button>
    <button class="cancel-btn" onclick="hideForms()">Cancel</button>
  </div>

  <script>
    function showForm(id) {
      document.querySelectorAll('.form-container').forEach(form => {
        form.style.display = 'none';
      });
      const target = document.getElementById(id);
      if (target) target.style.display = 'block';
    }

    function hideForms() {
      document.querySelectorAll('.form-container').forEach(form => {
        form.style.display = 'none';
      });
    }

    document.getElementById('buttonBar').addEventListener('click', (e) => {
      const button = e.target.closest('button.white-btn');
      if (button && !button.disabled) {
        const targetId = button.getAttribute('data-target');
        if (targetId) showForm(targetId);
      }
    });

    function submitLogin() {
      const username = document.getElementById("loginUser").value;
      const password = document.getElementById("loginPass").value;
      fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      }).then(res => res.json()).then(data => alert(JSON.stringify(data)));
    }

    function submitSignup() {
      const name = document.getElementById("signupName").value;
      const age = document.getElementById("signupAge").value;
      const gender = document.getElementById("signupGender").value;
      const email = document.getElementById("signupEmail").value;
      const license = document.getElementById("signupLicense").value;
      const password = document.getElementById("signupPass").value;
      fetch("/signup", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, age, gender, email, license, password })
      }).then(res => res.json()).then(data => alert(JSON.stringify(data)));
    }

    function submitHospital() {
      const staffID = document.getElementById("hospitalID").value;
      const password = document.getElementById("hospitalPass").value;
      fetch("/hospital_login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ staffID, password })
      }).then(res => res.json()).then(data => alert(JSON.stringify(data)));
    }

    function submitEMT() {
      const code = document.getElementById("emtCode").value;
      fetch("/emt", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ code })
      }).then(res => res.json()).then(data => alert(JSON.stringify(data)));
    }
  </script>
</body>
</html>
