<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediConnect - Scope Diagnostic</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            color: #1a202c;
            margin-bottom: 0.5rem;
            font-size: 2rem;
        }
        
        .subtitle {
            color: #718096;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }
        
        .status-card {
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .status-header {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #2d3748;
        }
        
        .scope-grid {
            display: grid;
            gap: 0.75rem;
        }
        
        .scope-item {
            display: flex;
            align-items: center;
            padding: 0.75rem 1rem;
            background: white;
            border-radius: 8px;
            border: 2px solid;
        }
        
        .scope-granted {
            border-color: #48bb78;
            background: #f0fff4;
        }
        
        .scope-denied {
            border-color: #f56565;
            background: #fff5f5;
        }
        
        .scope-icon {
            font-size: 1.5rem;
            margin-right: 0.75rem;
        }
        
        .scope-name {
            flex: 1;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            font-weight: 600;
        }
        
        .scope-resource {
            font-size: 0.85rem;
            color: #718096;
            margin-top: 0.25rem;
        }
        
        .alert {
            padding: 1rem 1.5rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            font-weight: 500;
        }
        
        .alert-error {
            background: #fff5f5;
            border: 2px solid #fc8181;
            color: #c53030;
        }
        
        .alert-success {
            background: #f0fff4;
            border: 2px solid #9ae6b4;
            color: #2f855a;
        }
        
        .alert-warning {
            background: #fffaf0;
            border: 2px solid #fbd38d;
            color: #c05621;
        }
        
        .action-box {
            background: #fff5f5;
            border: 3px solid #fc8181;
            border-radius: 12px;
            padding: 1.5rem;
            margin-top: 2rem;
        }
        
        .action-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #c53030;
            margin-bottom: 1rem;
        }
        
        .action-steps {
            margin-left: 1.5rem;
            color: #2d3748;
            line-height: 1.8;
        }
        
        .action-steps li {
            margin-bottom: 0.5rem;
        }
        
        .epic-link {
            display: inline-block;
            background: #4299e1;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 1rem;
            transition: background 0.2s;
        }
        
        .epic-link:hover {
            background: #3182ce;
        }
        
        .loading {
            text-align: center;
            padding: 3rem;
            font-size: 1.2rem;
            color: #718096;
        }
        
        code {
            background: #edf2f7;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }
        
        .refresh-btn {
            background: #48bb78;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 1rem;
            transition: background 0.2s;
        }
        
        .refresh-btn:hover {
            background: #38a169;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 FHIR Scope Diagnostic</h1>
        <p class="subtitle">Check which scopes are granted vs denied</p>
        
        <div id="content" class="loading">
            Loading scope information...
        </div>
    </div>
    
    <script>
        async function loadScopeStatus() {
            try {
                // Fetch auth status
                const authResponse = await fetch('https://localhost:8000/api/auth-status', {
                    credentials: 'include'
                });
                
                if (!authResponse.ok) {
                    throw new Error('Not authenticated');
                }
                
                const authData = await authResponse.json();
                
                if (!authData.authenticated) {
                    document.getElementById('content').innerHTML = `
                        <div class="alert alert-error">
                            <strong>⚠️ Not Authenticated</strong><br>
                            Please log in first at <a href="http://localhost:3000/fhir-access">http://localhost:3000/fhir-access</a>
                        </div>
                    `;
                    return;
                }
                
                // Fetch scope diagnostic
                const diagResponse = await fetch('https://localhost:8000/api/scope-diagnostic', {
                    credentials: 'include'
                });
                
                if (!diagResponse.ok) {
                    throw new Error('Failed to fetch diagnostic data');
                }
                
                const diagData = await diagResponse.json();
                
                // Build the UI
                const hasIssues = diagData.missing_scopes.length > 0;
                const allGranted = !hasIssues;
                
                let html = '';
                
                // Status alert
                if (allGranted) {
                    html += `
                        <div class="alert alert-success">
                            <strong>✅ All Scopes Granted!</strong><br>
                            Your Epic app is properly configured. All requested scopes were granted.
                        </div>
                    `;
                } else {
                    html += `
                        <div class="alert alert-error">
                            <strong>❌ ${diagData.missing_scopes.length} Scope(s) Denied</strong><br>
                            Epic rejected some scopes. You need to configure your Epic app to include these scopes.
                        </div>
                    `;
                }
                
                // Granted scopes
                html += `
                    <div class="status-card">
                        <div class="status-header">✅ Granted Scopes (${diagData.granted_scopes.length})</div>
                        <div class="scope-grid">
                `;
                
                diagData.scope_details.forEach(scope => {
                    if (scope.granted) {
                        html += `
                            <div class="scope-item scope-granted">
                                <span class="scope-icon">✅</span>
                                <div style="flex: 1;">
                                    <div class="scope-name">${scope.scope}</div>
                                    ${scope.resource_type ? `<div class="scope-resource">${scope.resource_type}</div>` : ''}
                                </div>
                            </div>
                        `;
                    }
                });
                
                html += `
                        </div>
                    </div>
                `;
                
                // Denied scopes (if any)
                if (hasIssues) {
                    html += `
                        <div class="status-card" style="border-color: #fc8181;">
                            <div class="status-header">❌ Denied Scopes (${diagData.missing_scopes.length})</div>
                            <div class="scope-grid">
                    `;
                    
                    diagData.scope_details.forEach(scope => {
                        if (!scope.granted) {
                            html += `
                                <div class="scope-item scope-denied">
                                    <span class="scope-icon">❌</span>
                                    <div style="flex: 1;">
                                        <div class="scope-name">${scope.scope}</div>
                                        ${scope.resource_type ? `<div class="scope-resource">${scope.resource_type}</div>` : ''}
                                    </div>
                                </div>
                            `;
                        }
                    });
                    
                    html += `
                            </div>
                        </div>
                    `;
                    
                    // Action required box
                    html += `
                        <div class="action-box">
                            <div class="action-title">🔧 ACTION REQUIRED: Fix Your Epic App</div>
                            <ol class="action-steps">
                                <li>Go to Epic FHIR Developer Portal (link below)</li>
                                <li>Find your app with Client ID: <code>${authData.client_id || '1a3aabaa-38dd-4a03-ac3a-38de1c40cae2'}</code></li>
                                <li>Click <strong>"Edit Application"</strong></li>
                                <li>Find the <strong>"FHIR Scopes"</strong> or <strong>"OAuth Scopes"</strong> section</li>
                                <li>Move these scopes from <strong>"Available"</strong> to <strong>"Selected"</strong>:</li>
                            </ol>
                            <div style="margin: 1rem 0 1rem 2.5rem; background: white; padding: 1rem; border-radius: 8px;">
                                ${diagData.missing_scopes.map(s => `<div style="margin: 0.25rem 0;">• <code>${s}</code></div>`).join('')}
                            </div>
                            <ol class="action-steps" start="6">
                                <li>Click <strong>"Save"</strong> at the bottom</li>
                                <li><strong>CRITICAL:</strong> Log out and log back in to get a fresh OAuth token with the new scopes</li>
                            </ol>
                            <a href="https://fhir.epic.com/Developer/Apps" target="_blank" class="epic-link">
                                🔗 Open Epic FHIR Developer Portal
                            </a>
                        </div>
                    `;
                }
                
                html += `
                    <button class="refresh-btn" onclick="location.reload()">
                        🔄 Refresh Status
                    </button>
                `;
                
                document.getElementById('content').innerHTML = html;
                
            } catch (error) {
                document.getElementById('content').innerHTML = `
                    <div class="alert alert-error">
                        <strong>❌ Error</strong><br>
                        ${error.message}<br><br>
                        Make sure you're logged in at <a href="http://localhost:3000/fhir-access">http://localhost:3000/fhir-access</a>
                    </div>
                `;
            }
        }
        
        // Load on page load
        loadScopeStatus();
    </script>
</body>
</html>
